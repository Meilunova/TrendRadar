name: Hot News Crawler

on:
  schedule:
    # 保持每 30 分钟运行一次，确保后台数据连续
    - cron: "*/30 * * * *" 
  workflow_dispatch:

# 添加权限设置
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required files
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 文件不存在"
            exit 1
          fi
          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 文件不存在"
            exit 1
          fi

      # 【核心修改】：判断时间，动态决定是否开启通知
      - name: Check Time & Set Notification Mode
        id: check_time
        run: |
          # 获取当前 UTC 时间 (GitHub 服务器时间)
          current_hour=$(date -u +%H)
          current_minute=$(date -u +%M)
          
          echo "当前 UTC 时间: $current_hour:$current_minute"
          
          # 时间换算表：
          # UTC 00:xx = 北京时间 08:xx (早晨)
          # UTC 10:xx = 北京时间 18:xx (晚上6点)
          
          # 逻辑判断：
          # 1. 小时必须是 00 (北京8点) 或 10 (北京18点)
          # 2. 分钟必须小于 30 (确保只在 08:00 这一班车推送，08:30 那一班车不推)
          if [[ ("$current_hour" == "00" || "$current_hour" == "10") && "$current_minute" -lt 30 ]]; then
            echo "🔔 命中推送时间点 (北京时间 08:00 或 18:00)"
            echo "ENABLE_NOTIFICATION=true" >> $GITHUB_ENV
          else
            echo "🔕 非推送时间，执行静默爬取"
            echo "ENABLE_NOTIFICATION=false" >> $GITHUB_ENV
          fi

      - name: Run crawler
        env:
          # 这里会自动读取上面一步设置的 ENABLE_NOTIFICATION 变量
          # 当该变量为 false 时，程序只爬取数据不发送 Telegram
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GITHUB_ACTIONS: true
        run: python main.py

      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update by GitHub Actions at $(TZ=Asia/Shanghai date)" && git push)
